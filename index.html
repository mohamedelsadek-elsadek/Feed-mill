<script>
/* ============ State ============ */
const KEY='kawthar_full_v2';
let DB=null;
const FORMS=['محبب','مفتت'];

function freshFromSeed(){
  return {
    feeds:[...SEED.feeds], materials:[...SEED.materials],
    recipe:JSON.parse(JSON.stringify(SEED.recipe)),
    stores:[...SEED.stores], farms:[...SEED.farms],
    opening:[...SEED.opening], matOpen:[...SEED.matOpen],
    production:[...SEED.production], dispatch:[...SEED.dispatch],
    matIncoming:[...SEED.matIncoming],
    suppliers:[...(SEED.suppliers||[])], matDispatch:[...(SEED.matDispatch||[])],
    backups:[], created:new Date().toISOString()
  };
}
function load(){
  try{const r=localStorage.getItem(KEY);DB=r?JSON.parse(r):freshFromSeed();}
  catch(e){DB=freshFromSeed();}
  const f=freshFromSeed(); for(const k in f){ if(DB[k]===undefined) DB[k]=f[k]; }
}
const APP_VERSION='v20';
// دمج ذكي: يوحّد السجلات من غير ما يحذف أي حاجة من الطرفين
function recKey(r){ return JSON.stringify(r); }
function mergeArrays(a,b){
  const seen=new Set(), out=[];
  (a||[]).concat(b||[]).forEach(r=>{ const k=recKey(r); if(!seen.has(k)){seen.add(k);out.push(r);} });
  return out;
}
function mergeDB(local,remote){
  // يبدأ من المحلي ويضم سجلات الريموت اللي مش موجودة
  const merged=JSON.parse(JSON.stringify(local));
  ['production','dispatch','matIncoming','matDispatch','opening','matOpen'].forEach(k=>{
    merged[k]=mergeArrays(local[k],remote[k]);
  });
  // القوائم: اتحاد بالاسم
  ['feeds','materials','stores','farms','suppliers'].forEach(k=>{
    const s=new Set([...(local[k]||[]),...(remote[k]||[])]);
    merged[k]=Array.from(s);
  });
  // التركيبات: لو الريموت فيه مفاتيح زيادة ضيفها
  merged.recipe=Object.assign({},remote.recipe||{},local.recipe||{});
  // النسخ الاحتياطية: خُد الأطول
  merged.backups=((local.backups||[]).length>=(remote.backups||[]).length)?local.backups:remote.backups;
  return merged;
}
let __fbTimer=null, __fbApplying=false, __lastTs=0;
function cloudPush(){
  if(!window.__fb||!window.__fb.ready) return;
  clearTimeout(__fbTimer);
  __fbTimer=setTimeout(()=>{ DB.__ts=Date.now(); __lastTs=DB.__ts; window.__fb.push(DB); }, 600);
}
function save(){ DB.updated=new Date().toISOString(); localStorage.setItem(KEY,JSON.stringify(DB)); autoBackup(); if(!__fbApplying) cloudPush(); updateSyncBadge('sync'); }
function updateSyncBadge(state){
  const el=document.getElementById('syncBadge'); if(!el)return;
  if(state==='sync'){el.textContent='\u23f3 يزامن...';el.style.color='#f59e0b';}
  else if(state==='ok'){el.textContent='\u2601\ufe0f متزامن';el.style.color='#bbf7d0';}
  else if(state==='off'){el.textContent='\ud83d\udcf4 أوفلاين';el.style.color='#e8e6ff';}
}
let __gotCloud=false;
function startSync(){
  function attach(){
    if(!window.__fb||!window.__fb.ready){updateSyncBadge('off');return;}
    window.__fb.subscribe((payload,ts)=>{
      try{
        if(ts&&ts===__lastTs){ updateSyncBadge('ok'); return; } // صدى الكتابة بتاعتنا
        const remote=JSON.parse(payload);
        // السحابة هي المصدر: نطبّق اللي فيها مباشرة (بدون دمج)
        __fbApplying=true; DB=remote; localStorage.setItem(KEY,JSON.stringify(DB)); __fbApplying=false;
        __gotCloud=true;
        renderShell(); updateSyncBadge('ok');
      }catch(e){console.warn(e);}
    });
    // رفع لمرة واحدة: لو السحابة فاضية بعد لحظة، نرفع بياناتنا الحالية كبداية
    setTimeout(()=>{
      if(!__gotCloud){ DB.__ts=Date.now(); __lastTs=DB.__ts; window.__fb.push(DB); updateSyncBadge('ok'); }
    }, 1500);
  }
  if(window.__fb&&window.__fb.ready) attach();
  else window.addEventListener('fb-ready',attach);
}

/* ============ Helpers ============ */
const $=s=>document.querySelector(s);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const today=()=>new Date().toISOString().slice(0,10);
const fmt=n=>{n=+n||0;return n%1===0?n.toLocaleString('en-US'):n.toLocaleString('en-US',{maximumFractionDigits:3});};
const arDate=d=>{try{return new Date(d).toLocaleDateString('ar-EG',{day:'numeric',month:'short',year:'numeric'});}catch(e){return d;}};
function toast(m,i='✓'){const t=$('#toast');t.innerHTML=`<span>${i}</span>${m}`;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
const norm=f=>f==='مفتت'?'مفتت':'محبب';  // empty/anything -> محبب
const COLORS=['#6366f1','#7c6fdb','#5b6fe0','#8b7fe8','#a07fe0','#6d8de8','#b07fe0','#9d7fe8','#ec4899','#14b8a6','#f59e0b','#22c55e'];

/* ============ Calculations ============ */
function feedIdx(f){return DB.feeds.indexOf(f);}
function openingFor(feed,form){
  let s=0; DB.opening.forEach(o=>{ if(o.feed===feed && norm(o.form)===form) s+=+o.qty||0; }); return s;
}
function feedBalance(){
  const m={};
  DB.feeds.forEach(f=>FORMS.forEach(fo=>m[f+'|'+fo]={feed:f,form:fo,open:openingFor(f,fo),prod:0,disp:0}));
  DB.production.forEach(p=>{const k=p.feed+'|'+norm(p.form);if(m[k])m[k].prod+=+p.qty||0;});
  DB.dispatch.forEach(p=>{const k=p.feed+'|'+norm(p.form);if(m[k])m[k].disp+=+p.qty||0;});
  return Object.values(m).map(x=>({...x,bal:x.open+x.prod-x.disp}));
}
// raw material consumed (form-independent): sum over feeds produced * recipe/1000
function matConsumed(){
  const out={}; DB.materials.forEach(m=>out[m]=0);
  DB.production.forEach(p=>{
    const idx=feedIdx(p.feed); if(idx<0)return;
    DB.materials.forEach(m=>{ const kg=(DB.recipe[m]&&DB.recipe[m][idx])||0; out[m]+=(+p.qty||0)*kg/1000; });
  });
  return out;
}
function matIncoming(){const o={};DB.materials.forEach(m=>o[m]=0);DB.matIncoming.forEach(r=>o[r.mat]=(o[r.mat]||0)+(+r.qty||0));return o;}
function matOpenFor(m){let s=0;DB.matOpen.forEach(o=>{if(o.mat===m)s+=+o.qty||0;});return s;}
function matDispatched(){
  const o={}; DB.materials.forEach(m=>o[m]=0);
  (DB.matDispatch||[]).forEach(r=>{ if(o[r.mat]!==undefined) o[r.mat]+=+r.qty||0; });
  return o;
}
function matBalance(){
  const cons=matConsumed(),inc=matIncoming(),sold=matDispatched(),out={};
  DB.materials.forEach(m=>{const op=matOpenFor(m);out[m]={open:op,inc:inc[m]||0,cons:cons[m]||0,sold:sold[m]||0,bal:op+(inc[m]||0)-(cons[m]||0)-(sold[m]||0)};});
  return out;
}
function storeBalance(store){
  const m={};
  DB.feeds.forEach(f=>FORMS.forEach(fo=>m[f+'|'+fo]={feed:f,form:fo,open:0,in:0,out:0}));
  // رصيد أول المدة يُعتبر في المخزن الرئيسي (أول مخزن)
  const mainStore=(DB.stores&&DB.stores[0])||'المخزن الرئيسي';
  if(!store||store===mainStore){
    (DB.opening||[]).forEach(o=>{const k=o.feed+'|'+norm(o.form);if(m[k])m[k].open+=+o.qty||0;});
  }
  DB.production.forEach(p=>{ if(!store||p.store===store){const k=p.feed+'|'+norm(p.form);if(m[k])m[k].in+=+p.qty||0;} });
  DB.dispatch.forEach(p=>{ if(p.type==='من المخزن' && (!store||p.store===store)){const k=p.feed+'|'+norm(p.form);if(m[k])m[k].out+=+p.qty||0;} });
  return Object.values(m).map(x=>({...x,bal:x.open+x.in-x.out}));
}
function farmTotals(from,to){
  const m={};
  DB.dispatch.forEach(d=>{
    if(from&&d.date<from)return; if(to&&d.date>to)return;
    if(!d.farm)return; m[d.farm]=(m[d.farm]||0)+(+d.qty||0);
  });
  return m;
}
function inRange(d,from,to){ if(from&&d<from)return false; if(to&&d>to)return false; return true; }

/* ============ Backup ============ */
function snapshotDB(){
  return JSON.stringify({
    feeds:DB.feeds,materials:DB.materials,recipe:DB.recipe,stores:DB.stores,farms:DB.farms,
    suppliers:DB.suppliers,opening:DB.opening,matOpen:DB.matOpen,
    production:DB.production,dispatch:DB.dispatch,matIncoming:DB.matIncoming,matDispatch:DB.matDispatch
  });
}
function autoBackup(){
  if(!DB.backups)DB.backups=[];
  const t=today();
  const last=DB.backups[DB.backups.length-1];
  // one automatic snapshot per day
  if(last&&last.date===t&&last.auto) return;
  DB.backups.push({date:t,time:new Date().toISOString(),auto:true,snapshot:snapshotDB()});
  trimBackups();
  localStorage.setItem(KEY,JSON.stringify(DB));
}
function manualSnapshot(reason){
  if(!DB.backups)DB.backups=[];
  DB.backups.push({date:today(),time:new Date().toISOString(),auto:false,reason:reason||'يدوي',snapshot:snapshotDB()});
  trimBackups();
  localStorage.setItem(KEY,JSON.stringify(DB));
}
function trimBackups(){
  // keep last 30 snapshots
  if(DB.backups.length>30) DB.backups=DB.backups.slice(DB.backups.length-30);
}
function restoreBackup(idx){
  const b=DB.backups[idx]; if(!b)return;
  confirmBox('استرجاع هذه النسخة؟','هيتم استبدال البيانات الحالية ببيانات نسخة '+arDate(b.date)+'. (هنعمل نسخة من الحالي قبلها للأمان).',()=>{
    manualSnapshot('قبل الاسترجاع');
    const snap=JSON.parse(b.snapshot);
    Object.keys(snap).forEach(k=>{ DB[k]=snap[k]; });
    save();toast('تم الاسترجاع لنسخة '+arDate(b.date));go('dash');
  });
}
function downloadOneBackup(idx){
  const b=DB.backups[idx]; if(!b)return;
  const blob=new Blob([b.snapshot],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`نسخة_الكوثر_${b.date}.json`;a.click();toast('تم تنزيل النسخة');
}
function delOneBackup(idx){
  confirmBox('حذف هذه النسخة؟','',()=>{DB.backups.splice(idx,1);localStorage.setItem(KEY,JSON.stringify(DB));toast('تم الحذف','🗑️');renderView();});
}
function downloadBackup(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`نسخة_الكوثر_${today()}.json`;a.click();
  toast('تم حفظ نسخة احتياطية');
}
function importBackup(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{const imp=JSON.parse(r.result);DB=imp;save();toast('تم الاستيراد بنجاح');go('dash');}catch(err){toast('ملف غير صالح','⚠️');}};
    r.readAsText(f);};
  inp.click();
}

let repFrom=null,repTo=null,repMode='today';
function vReport(){
  return `<h2 class="sec">التقارير</h2>

  <div id="repBody"></div>`;

function setRepMode(m){repMode=m;renderView();}
function initReport(){renderReport();}
function repRange(){
  const t=today();const d=new Date();const iso=x=>x.toISOString().slice(0,10);let from,to=t;
  if(repMode==='today')from=t;
  else if(repMode==='yesterday'){d.setDate(d.getDate()-1);from=iso(d);to=iso(d);}
  else if(repMode==='week'){d.setDate(d.getDate()-6);from=iso(d);}
  else if(repMode==='month'){d.setDate(d.getDate()-29);from=iso(d);}
  else{from=$('#rFrom')?.value||t;to=$('#rTo')?.value||t;}
  return{from,to};
}
function renderReport(){
  const {from,to}=repRange();
  const prods=DB.production.filter(p=>inRange(p.date,from,to));
  const disps=DB.dispatch.filter(d=>inRange(d.date,from,to));
  const totP=prods.reduce((s,p)=>s+(+p.qty||0),0), totD=disps.reduce((s,d)=>s+(+d.qty||0),0);
  const pf={}; prods.forEach(p=>{const k=p.feed+'|'+norm(p.form);pf[k]=(pf[k]||0)+(+p.qty||0);});
  const df={}; disps.forEach(d=>{const k=d.feed+'|'+norm(d.form);df[k]=df[k]||{tot:0,direct:0,store:0};df[k].tot+=+d.qty||0;if(d.type==='صرف مباشر')df[k].direct+=+d.qty||0;else df[k].store+=+d.qty||0;});
  const farm={}; disps.forEach(d=>{if(d.farm)farm[d.farm]=(farm[d.farm]||0)+(+d.qty||0);});

  const pRows=Object.entries(pf).filter(([k,v])=>v).map(([k,v])=>{const[f,fo]=k.split('|');return `<tr><td>${f}</td><td><span class="pill ${fo==='محبب'?'m':'f'}">${fo}</span></td><td style="font-weight:700;color:#6366f1">${fmt(v)}</td></tr>`;}).join('')||'<tr><td colspan=3 class=empty>لا يوجد</td></tr>';
  const dRows=Object.entries(df).map(([k,v])=>{const[f,fo]=k.split('|');return `<tr><td>${f}</td><td><span class="pill ${fo==='محبب'?'m':'f'}">${fo}</span></td><td style="font-weight:700;color:#ec4899">${fmt(v.tot)}</td><td style="color:#d97706">${fmt(v.direct)}</td><td style="color:#0284c7">${fmt(v.store)}</td></tr>`;}).join('')||'<tr><td colspan=5 class=empty>لا يوجد</td></tr>';
  const fRows=Object.entries(farm).sort((a,b)=>b[1]-a[1]).map(([n,v])=>`<tr><td style="font-weight:700">${n}</td><td style="font-weight:700;color:#7c6fdb">${fmt(v)}</td></tr>`).join('')||'<tr><td colspan=2 class=empty>لا يوجد</td></tr>';

  $('#repBody').innerHTML=`
  <div class="kpis"><div class="kpi"><div class="lbl">الإنتاج</div><div class="val">${fmt(totP)} <span class="u">كيلو</span></div></div>
    <div class="kpi"><div class="lbl">الصرف</div><div class="val">${fmt(totD)} <span class="u">كيلو</span></div></div>
    <div class="kpi"><div class="lbl">المزارع</div><div class="val">${Object.keys(farm).length}</div></div></div>
  <p style="text-align:center;color:#857fb0;font-size:12px;margin-bottom:14px">من ${arDate(from)} إلى ${arDate(to)}</p>
  <div class="card"><h3><span class="d"></span>① الإنتاج حسب النوع</h3><div class="tbl-wrap"><table><thead><tr><th>النوع</th><th>الشكل</th><th>الكمية</th></tr></thead><tbody>${pRows}</tbody></table></div></div>
  <div class="card"><h3><span class="d"></span>② الصرف — راح فين</h3><div class="tbl-wrap"><table><thead><tr><th>النوع</th><th>الشكل</th><th>الكلي</th><th>مباشر</th><th>مخزن</th></tr></thead><tbody>${dRows}</tbody></table></div></div>

}

/* ============ Chart (no library) ============ */
function barChart(id,labels,values){
  const cv=document.getElementById(id);if(!cv||!values.length)return;
  const ctx=cv.getContext('2d');const W=cv.width=cv.clientWidth*2;const H=cv.height*2;
  const pad=30*2;const slot=(W-pad)/Math.max(1,values.length);const bw=slot*0.6;
  const max=Math.max(1,...values);ctx.clearRect(0,0,W,H);ctx.textAlign='center';
  values.forEach((v,i)=>{const x=pad/2+i*slot+slot*0.2;const h=(H-70)*(v/max);const y=H-46-h;
    const g=ctx.createLinearGradient(0,y,0,H-46);g.addColorStop(0,COLORS[i%COLORS.length]);g.addColorStop(1,'#b07fe0');
    ctx.fillStyle=g;if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,bw,h,[10,10,0,0]);ctx.fill();}else ctx.fillRect(x,y,bw,h);
    ctx.fillStyle='#2d2a55';ctx.font='bold 22px Arial';ctx.fillText(fmt(v),x+bw/2,y-8);
    ctx.fillStyle='#857fb0';ctx.font='19px Arial';ctx.fillText(labels[i],x+bw/2,H-16);});
}

  h+='</body></html>';
  const blob=new Blob(['\ufeff'+h],{type:'application/vnd.ms-excel'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`تقرير_الكوثر_${today()}.xls`;a.click();
