<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-0: #0a0e1a;
  --bg-1: #111827;
  --bg-2: #1f2937;
  --bg-3: #374151;
  --border: #374151;
  --text: #f9fafb;
  --text-dim: #9ca3af;
  --text-dimmer: #6b7280;
  --primary: #3b82f6;
  --primary-h: #2563eb;
  --green: #10b981;
  --red: #ef4444;
  --orange: #f59e0b;
  --purple: #8b5cf6;
  --yellow: #eab308;
}
body {
  font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
  background: var(--bg-0);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}
.app { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: 240px;
  background: var(--bg-1);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  transition: width 0.3s;
  flex-shrink: 0;
}
.sidebar.collapsed { width: 60px; }
.sidebar.collapsed .nav-label,
.sidebar.collapsed .logo-text,
.sidebar.collapsed .user-info { display: none; }

.logo {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--purple));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 16px;
  flex-shrink: 0;
}
.logo-text { font-weight: bold; font-size: 14px; line-height: 1.2; }
.logo-text small { color: var(--text-dim); font-weight: normal; font-size: 11px; }

.nav { flex: 1; padding: 8px; overflow-y: auto; }
.nav-item {
  display: flex;
  align-items: center;

}
.nav-item:hover { background: var(--bg-2); color: var(--text); }
.nav-item.active {
  background: var(--primary);

}
.nav-icon { font-size: 18px; flex-shrink: 0; }
.nav-badge {

}

.sidebar-footer { padding: 8px; border-top: 1px solid var(--border); }
.user-info { padding: 12px; }
.user-info small { color: var(--text-dimmer); font-size: 11px; }
.user-info p { font-size: 13px; font-weight: 500; margin-bottom: 4px; }

/* Main */
.main { flex: 1; overflow-x: hidden; }
.topbar {

.topbar-actions { display: flex; align-items: center; gap: 12px; }

.page { padding: 24px; }
.page-header {

.stat-card {

}
.stat-card.red {

.stat-card.orange {

}
.stat-card.purple {

.stat-label { color: var(--text-dim); font-size: 12px; margin-bottom: 6px; }

.stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.stat-icon {

}

/* Sections / Panels */
.panel {
  background: rgba(31, 41, 55, 0.6);

}
.panel-header {

}

.grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }

/* Badges */
.badge {

  padding: 3px 10px;

  font-size: 11px;
  font-weight: 500;
}
.badge.blue { background: rgba(59, 130, 246, 0.2); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.3); }
.badge.green { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); }
.badge.red { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
.badge.orange { background: rgba(245, 158, 11, 0.2); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.3); }
.badge.purple { background: rgba(139, 92, 246, 0.2); color: #c4b5fd; border: 1px solid rgba(139, 92, 246, 0.3); }
.badge.gray { background: rgba(107, 114, 128, 0.2); color: #d1d5db; border: 1px solid rgba(107, 114, 128, 0.3); }
.badge.yellow { background: rgba(234, 179, 8, 0.2); color: #fde047; border: 1px solid rgba(234, 179, 8, 0.3); }

/* Tables */
.table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { background: rgba(17, 24, 39, 0.8); }
th {

  text-align: right;
  color: var(--text-dim);
  font-weight: 500;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 12px;
  border-bottom: 1px solid rgba(55, 65, 81, 0.5);
}
tbody tr:hover { background: rgba(55, 65, 81, 0.2); }
.mono { font-family: 'Consolas', 'Monaco', monospace; }

/* Buttons */
.btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
  font-family: inherit;
}
.btn:hover { background: var(--primary-h); }
.btn.green { background: var(--green); }
.btn.green:hover { background: #059669; }
.btn.red { background: var(--red); }
.btn.red:hover { background: #dc2626; }
.btn.gray { background: var(--bg-3); }
.btn.gray:hover { background: #4b5563; }
.btn.small { padding: 4px 10px; font-size: 11px; }
.btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
.btn.ghost:hover { color: var(--text); border-color: var(--text-dim); }

/* Inputs */
.input {
  background: var(--bg-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 8px;

}
.input:focus { outline: none; border-color: var(--primary); }
.label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }

/* Filter chips */
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.chip {
  background: var(--bg-2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
}
.chip:hover { color: var(--text); }
.chip.active { background: var(--primary); color: white; border-color: var(--primary); }

/* Progress bars */
.bar {
  height: 6px;
  background: var(--bg-3);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 4px;
}
.bar-fill {
  height: 100%;
  background: linear-gradient(to left, #3b82f6, #06b6d4);
  border-radius: 3px;
  transition: width 0.5s;
}
.bar-fill.red { background: linear-gradient(to left, #ef4444, #f87171); }
.bar-fill.green { background: linear-gradient(to left, #10b981, #34d399); }
.bar-fill.orange { background: linear-gradient(to left, #f59e0b, #fbbf24); }

/* Chart bars */
.chart-bars {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  height: 140px;
  padding: 8px 0;
}
.chart-bar {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.chart-bar-value { font-size: 11px; color: var(--text-dim); font-family: monospace; }
.chart-bar-fill {
  width: 100%;
  background: linear-gradient(to top, #3b82f6, #60a5fa);
  border-radius: 4px 4px 0 0;
  min-height: 2px;
  transition: height 0.5s;
}
.chart-bar-label { font-size: 11px; color: var(--text-dimmer); white-space: nowrap; }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.75);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 16px;
}
.modal {
  background: var(--bg-1);
  border: 1px solid var(--border);

  padding: 24px;
  width: 100%;

.modal-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; }
.modal-row { display: flex; gap: 8px; margin-top: 16px; }
.modal-row .btn { flex: 1; padding: 10px; }

/* Forms */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-field { margin-bottom: 12px; }

/* Conditional cells */
.cell-low { color: #fca5a5; font-weight: bold; }
.cell-ok { color: #6ee7b7; font-weight: bold; }
.cell-warn { color: #fcd34d; }

/* Editable cells */
.editable {
  cursor: pointer;
  position: relative;
  border-radius: 4px;
  padding: 2px 6px;
  transition: background 0.15s;
  display: inline-block;

}
.editable:hover {

}

.alert-row {

}

.recipe-row {

}
.recipe-row:hover { border-color: var(--text-dim); }

.metric-pill {

.empty-state {

/* Print */
@media print {

.login-screen {

<script>
// ============================================================
// FIREBASE CONFIGURATION
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyCkT6eg-Ga8akTTGb-dAuSoFzlsHN0dBWM",
  authDomain: "feedmill-erp.firebaseapp.com",
  databaseURL: "https://feedmill-erp-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "feedmill-erp",
  storageBucket: "feedmill-erp.firebasestorage.app",
  messagingSenderId: "1054256652630",
  appId: "1:1054256652630:web:004cf65f18ba65940f36f7"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// Enable offline persistence
db.goOnline();

// Current authenticated user
let currentUser = null;
let currentUserRole = 'viewer'; // default until loaded
let allUsers = {}; // {email: {role, name, addedAt, addedBy}}
let isOnline = navigator.onLine;
let dataLoaded = false;
let rolesLoaded = false;
let firebaseListenersActive = false;

// ============================================================
// ROLES & PERMISSIONS
// ============================================================
const ROLES = {
  admin: {
    label: 'مدير النظام',
    icon: '👑',
    color: 'red',
    can: ['*'], // can do everything
  },
  accountant: {
    label: 'محاسب',
    icon: '💰',
    color: 'green',
    can: ['view_all', 'edit_sales', 'edit_customers', 'view_reports', 'export'],
  },
  warehouse: {
    label: 'مدير مخزن',
    icon: '📦',
    color: 'blue',
    can: ['view_all', 'edit_inventory', 'edit_movements', 'edit_production'],
  },
  operator: {
    label: 'مشغل إنتاج',
    icon: '👷',
    color: 'orange',
    can: ['view_all', 'edit_production'],
  },
  viewer: {
    label: 'مشاهد',
    icon: '👀',
    color: 'gray',
    can: ['view_all'],
  },
};

function canDo(action) {
  if (!currentUserRole || !ROLES[currentUserRole]) return false;
  const perms = ROLES[currentUserRole].can;
  return perms.includes('*') || perms.includes(action);
}

function isAdmin() {
  return currentUserRole === 'admin';
}

// ============================================================
// AUTOMATIC DAILY BACKUP
// ============================================================
function todayKey() {
  return new Date().toISOString().split('T')[0]; // YYYY-MM-DD
}

async function checkAndCreateDailyBackup() {
  if (!currentUser || !state || !dataLoaded) return;
  try {
    const today = todayKey();
    const backupRef = db.ref(`backups/${today}`);
    const snap = await backupRef.once('value');

    if (!snap.exists()) {
      // No backup today yet - create one
      await backupRef.set({
        data: state,
        createdAt: new Date().toISOString(),
        createdBy: currentUser.email,
      });
      console.log('✅ Daily backup created:', today);
      // Cleanup old backups (keep last 30 days)
      await cleanupOldBackups();
    }
  } catch (err) {
    console.error('Backup failed:', err);
  }
}

async function cleanupOldBackups() {
  try {
    const snap = await db.ref('backups').once('value');
    const all = snap.val() || {};
    const dates = Object.keys(all).sort(); // ascending
    const today = new Date();
    const cutoff = new Date(today);
    cutoff.setDate(cutoff.getDate() - 30); // keep 30 days
    const cutoffStr = cutoff.toISOString().split('T')[0];

    const toDelete = dates.filter(d => d < cutoffStr);
    for (const d of toDelete) {
      await db.ref(`backups/${d}`).remove();
      console.log('🗑️ Deleted old backup:', d);
    }
  } catch (err) {
    console.error('Cleanup failed:', err);
  }
}

async function manualBackup() {
  if (!currentUser) return;
  const today = todayKey();
  const time = new Date().toISOString().split('T')[1].split('.')[0].replace(/:/g, '-');
  const key = `${today}_${time}_manual`;
  try {
    await db.ref(`backups/${key}`).set({
      data: state,
      createdAt: new Date().toISOString(),
      createdBy: currentUser.email,
      manual: true,
    });
    alert(`✅ تم إنشاء نسخة احتياطية يدوية:\n${key}`);
    render();
  } catch (err) {
    alert('فشل إنشاء النسخة الاحتياطية: ' + err.message);
  }
}

async function listBackups() {
  try {
    const snap = await db.ref('backups').once('value');
    const all = snap.val() || {};
    return Object.entries(all)
      .map(([key, val]) => ({ key, ...val }))
      .sort((a, b) => b.createdAt.localeCompare(a.createdAt));
  } catch (err) {
    console.error('List backups failed:', err);
    return [];
  }
}

async function restoreBackup(backupKey) {
  if (!isAdmin()) { alert('⛔ هذه العملية متاحة للأدمن فقط'); return; }
  if (!confirm(`⚠️ تحذير شديد:\n\nسيتم استبدال كل البيانات الحالية بالنسخة الاحتياطية:\n${backupKey}\n\nهذا الإجراء لا يمكن التراجع عنه!\n\nهل أنت متأكد تماماً؟`)) return;
  if (!confirm('تأكيد أخير: هل ترغب فعلاً في استرجاع هذه النسخة؟')) return;

  try {
    const snap = await db.ref(`backups/${backupKey}`).once('value');
    const backup = snap.val();
    if (!backup || !backup.data) { alert('النسخة الاحتياطية غير موجودة'); return; }

    // Create emergency backup before restore
    const emergencyKey = `${todayKey()}_pre-restore_${Date.now()}`;
    await db.ref(`backups/${emergencyKey}`).set({
      data: state,
      createdAt: new Date().toISOString(),
      createdBy: currentUser.email,
      note: 'تلقائية قبل الاسترجاع',
    });

    // Restore
    await db.ref('erp_data').set(backup.data);
    alert(`✅ تم استرجاع البيانات بنجاح من النسخة:\n${backupKey}\n\nتم حفظ نسخة طارئة من البيانات السابقة قبل الاسترجاع.`);
    render();
  } catch (err) {
    alert('فشل الاسترجاع: ' + err.message);
  }
}

async function deleteBackup(backupKey) {
  if (!isAdmin()) { alert('⛔ هذه العملية متاحة للأدمن فقط'); return; }
  if (!confirm(`حذف النسخة الاحتياطية "${backupKey}" نهائياً؟`)) return;
  try {
    await db.ref(`backups/${backupKey}`).remove();
    alert('✅ تم حذف النسخة');
    render();
  } catch (err) {
    alert('فشل الحذف: ' + err.message);
  }
}

// Setup Firebase realtime listener (called after login)
function setupFirebaseSync() {
  if (firebaseListenersActive) return;
  firebaseListenersActive = true;

  // Listen to ERP data
  db.ref('erp_data').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
      state = {
        materials: data.materials || DEFAULT_DATA.materials,
        formulas: data.formulas || DEFAULT_DATA.formulas,
        production: data.production || DEFAULT_DATA.production,
        movements: data.movements || DEFAULT_DATA.movements,
        sales: data.sales || DEFAULT_DATA.sales || [],
      };
      state.production.forEach(p => {
        if (p.customer === undefined) p.customer = '';
      });
    } else {
      state = JSON.parse(JSON.stringify(DEFAULT_DATA));
      db.ref('erp_data').set(state);
    }
    dataLoaded = true;
    // Trigger daily backup check (won't block UI)
    setTimeout(checkAndCreateDailyBackup, 2000);
    if (currentUser && rolesLoaded) render();
  }, (err) => {
    console.error('Firebase read failed:', err);
    alert('فشل قراءة البيانات: ' + err.message);
  });

  // Listen to users/roles list
  db.ref('users').on('value', (snapshot) => {
    const users = snapshot.val() || {};

    // First time setup: if no users exist, make first 3 admins
    if (Object.keys(users).length === 0 && currentUser) {
      // Auto-bootstrap: make the current user an admin
      const emailKey = emailToKey(currentUser.email);
      db.ref(`users/${emailKey}`).set({
        email: currentUser.email,
        role: 'admin',
        name: currentUser.email.split('@')[0],
        addedAt: new Date().toISOString(),
        addedBy: 'system (auto)',
      });
      // Also add the other 2 known admins
      const knownAdmins = [
        'ahmedelsadek1239@gmail.com',
        'mohamedelsadek1239@gmail.com',
        'vetmohamedelsadek@gmail.com',
      ];
      knownAdmins.forEach(email => {
        if (email !== currentUser.email) {
          db.ref(`users/${emailToKey(email)}`).set({
            email,
            role: 'admin',
            name: email.split('@')[0],
            addedAt: new Date().toISOString(),
            addedBy: 'system (auto)',
          });
        }
      });
      return; // will re-trigger via listener
    }

    allUsers = users;
    // Find current user's role
    const myKey = emailToKey(currentUser?.email || '');
    const myRecord = users[myKey];
    if (myRecord) {
      currentUserRole = myRecord.role || 'viewer';
    } else {
      currentUserRole = 'viewer'; // unknown user = viewer only
    }
    rolesLoaded = true;
    if (currentUser && dataLoaded) render();
  }, (err) => {
    console.error('Users read failed:', err);
    rolesLoaded = true;
    if (currentUser && dataLoaded) render();
  });
}

// Convert email to a valid Firebase key (replace . with ,)

  return email.replace(/\./g, ',').replace(/@/g, '_at_');

function keyToEmail(key) {
  return key.replace(/_at_/g, '@').replace(/,/g, '.');

  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (imported.materials && imported.formulas) {
        state = imported;
        db.ref('erp_data').set(state).then(() => {
          render();

      } else {
        alert('ملف غير صالح');
      }
    } catch (err) {
      alert('فشل في قراءة الملف');
    }
  };
  reader.readAsText(file);
}

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) {
    showLoginError('يرجى إدخال البريد الإلكتروني وكلمة المرور');
    return;
  }
  const root = document.getElementById('root');
  root.innerHTML = renderLogin('', 'جاري تسجيل الدخول...');

  auth.signInWithEmailAndPassword(email, password)
    .then((cred) => {
      currentUser = cred.user;
      setupFirebaseSync();
      // render() will be called by onValue listener once data loads
    })
    .catch((err) => {
      let msg = 'فشل تسجيل الدخول';
      if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') {
        msg = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
      } else if (err.code === 'auth/user-not-found') {
        msg = 'لا يوجد حساب بهذا البريد';
      } else if (err.code === 'auth/too-many-requests') {
        msg = 'محاولات كثيرة فاشلة. حاول لاحقاً';
      } else if (err.code === 'auth/network-request-failed') {
        msg = 'مشكلة اتصال بالإنترنت';
      } else {
        msg = err.message;
      }
      showLoginError(msg);
    });
}

function showLoginError(msg) {
  const root = document.getElementById('root');
  root.innerHTML = renderLogin(msg);
}

function doLogout() {
  if (!confirm('هل تريد تسجيل الخروج؟')) return;
  db.ref('erp_data').off();
  db.ref('users').off();
  firebaseListenersActive = false;
  dataLoaded = false;
  rolesLoaded = false;
  currentUserRole = 'viewer';
  allUsers = {};
  auth.signOut().then(() => {
    currentUser = null;
    render();
  });
}

// Watch auth state
auth.onAuthStateChanged((user) => {
  if (user) {
    currentUser = user;
    setupFirebaseSync();
  } else {
    currentUser = null;
    const root = document.getElementById('root');
    if (root) root.innerHTML = renderLogin();
  }
});

// ============================================================
function calcFormulaCost(formula) {
  return formula.ingredients.reduce((sum, ing) => {
    const mat = state.materials.find(m => m.id === ing.materialId);
    return mat ? sum + (ing.percentage / 100) * mat.tonPrice : sum;
  }, 0);
}

function calcFormulaProtein(formula) {
  return formula.ingredients.reduce((sum, ing) => {
    const mat = state.materials.find(m => m.id === ing.materialId);
    return mat ? sum + (ing.percentage / 100) * (mat.protein || 0) : sum;
  }, 0);
}

function calcMaxProduction(formula) {
  let maxTons = Infinity;
  let limitingMat = null;
  formula.ingredients.forEach(ing => {
    if (ing.percentage === 0) return;
    const mat = state.materials.find(m => m.id === ing.materialId);
    if (!mat) return;
    const possible = mat.currentStock / (ing.percentage / 100);
    if (possible < maxTons) {
      maxTons = possible;
      limitingMat = mat.name;
    }
  });
  return { maxTons: maxTons === Infinity ? 0 : maxTons, limitingMat };
}

function renderDashboard() {
  const today = todayStr();
  const todayProd = state.production.filter(p => p.date === today);
  const todayQty = todayProd.reduce((s, p) => s + p.quantity, 0);
  const totalProd = state.production.reduce((s, p) => s + p.quantity, 0);
  const lowStock = state.materials.filter(m => m.currentStock <= m.minStock);
  const totalStockValue = state.materials.reduce((s, m) => s + m.currentStock * m.tonPrice, 0);

  // Recent month production simulation
  const monthDays = [
    { d: '1', q: 45 }, { d: '5', q: 62 }, { d: '10', q: 38 },
    { d: '15', q: 71 }, { d: '20', q: 55 }, { d: '25', q: 68 }, { d: '28', q: todayQty || 18 },
  ];
  const maxQ = Math.max(...monthDays.map(d => d.q), 1);

  // Formula distribution
  const formulaDist = state.formulas.map(f => ({
    name: f.name.replace('علف ', ''),
    count: state.production.filter(p => p.formulaId === f.id).reduce((s, p) => s + p.quantity, 0),
  }));
  const maxDist = Math.max(...formulaDist.map(d => d.count), 1);

  return `
    <div class="page-header">
      <div>
        <div class="page-title">لوحة التحكم الرئيسية</div>
        <div class="page-subtitle">${new Date().toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })} — مصنع الأعلاف المتكامل</div>
      </div>
      <div style="display:flex;gap:8px;">
        <span class="badge green">🟢 المصنع يعمل</span>
        ${lowStock.length > 0 ? `<span class="badge red">⚠️ ${lowStock.length} تنبيه</span>` : ''}
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">🏭</div>
        <div class="stat-label">إنتاج اليوم</div>
        <div class="stat-value">${todayQty} طن</div>
        <div class="stat-sub">${todayProd.length} دفعة</div>
      </div>
      <div class="stat-card green">
        <div class="stat-icon">📦</div>
        <div class="stat-label">إجمالي الإنتاج</div>
        <div class="stat-value">${totalProd} طن</div>
        <div class="stat-sub">هذا الشهر</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-icon">💰</div>
        <div class="stat-label">قيمة المخزون</div>
        <div class="stat-value">${money(totalStockValue)}</div>
        <div class="stat-sub">جميع الخامات</div>
      </div>
      <div class="stat-card ${lowStock.length > 0 ? 'red' : 'green'}">
        <div class="stat-icon">⚠️</div>
        <div class="stat-label">تنبيهات المخزون</div>
        <div class="stat-value">${lowStock.length}</div>
        <div class="stat-sub">مواد تحت الحد الأدنى</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel" style="grid-column: span 2;">
        <div class="panel-header"><div class="panel-title">📈 الإنتاج اليومي — مايو 2026</div></div>
        <div class="chart-bars">
          ${monthDays.map(d => `
            <div class="chart-bar">
              <span class="chart-bar-value">${d.q}</span>
              <div class="chart-bar-fill" style="height: ${(d.q / maxQ) * 100}%"></div>
              <span class="chart-bar-label">${d.d}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-header"><div class="panel-title">🥧 توزيع الإنتاج بالوصفة</div></div>
        ${formulaDist.map(f => `
          <div style="margin-bottom: 12px;">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
              <span>${esc(f.name)}</span>
              <span class="mono" style="color: #60a5fa;">${f.count} طن</span>
            </div>
            <div class="bar"><div class="bar-fill" style="width: ${(f.count / maxDist) * 100}%"></div></div>
          </div>
        `).join('')}
      </div>

      <div class="panel">
        <div class="panel-header"><div class="panel-title">📊 مستويات المخزون الرئيسية</div></div>
        ${state.materials.slice(0, 6).map(m => {
          const max = m.currentStock * 1.5 + m.minStock;
          const pct = Math.min(100, (m.currentStock / max) * 100);
          const cls = pct < 30 ? 'red' : pct < 60 ? 'orange' : 'green';
          return `
            <div style="margin-bottom: 12px;">
              <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
                <span>${esc(m.name)}</span>
                <span class="mono">${fmt(m.currentStock, 1)} طن</span>
              </div>
              <div class="bar"><div class="bar-fill ${cls}" style="width: ${pct}%"></div></div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><div class="panel-title">🚨 تنبيهات المخزون وآخر الدفعات</div></div>
      ${lowStock.length === 0 ? `
        <div class="empty-state"><div class="empty-state-icon">✅</div>جميع المواد فوق الحد الأدنى</div>
      ` : `
        <div style="margin-bottom: 16px;">
          ${lowStock.map(m => `
            <div class="alert-row">
              <div>
                <div style="color: #fca5a5; font-weight: 500;">${esc(m.name)}</div>
                <small style="color: var(--text-dim);">الحد الأدنى: ${m.minStock} طن</small>
              </div>
              <div style="text-align: left;">
                <div class="mono" style="color: #ef4444; font-weight: bold;">${fmt(m.currentStock, 1)} طن</div>
                <span class="badge red">طلب شراء عاجل</span>
              </div>
            </div>
          `).join('')}
        </div>
      `}

      <h4 style="margin: 12px 0; font-size: 13px; color: var(--text-dim);">⚙️ آخر دفعات الإنتاج</h4>
      ${state.production.slice(-3).reverse().map(p => `
        <div style="display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px;">
          <div>
            <div style="font-weight:500;">${esc(p.formulaName)}</div>
            <small style="color: var(--text-dim);">${esc(p.batchNo)}</small>
          </div>
          <div style="text-align:left;">
            <div class="mono" style="color: #60a5fa; font-weight: bold;">${p.quantity} طن</div>
            <span class="badge ${p.status === 'مكتمل' ? 'green' : 'orange'}">${esc(p.status)}</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function editCell(materialId, field, el) {
  const mat = state.materials.find(m => m.id === materialId);
  if (!mat) return;
  const oldValue = mat[field];
  const isNumber = ['tonPrice', 'currentStock', 'minStock', 'protein', 'energy'].includes(field);

  // For category, use dropdown
  if (field === 'category') {
    const cats = ['حبوب', 'بروتين', 'معادن', 'دهون', 'مركزات', 'إضافات', 'أحماض أمينية'];
    const select = document.createElement('select');
    select.className = 'input';
    select.style.width = '120px';
    select.style.padding = '4px';
    cats.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      if (c === oldValue) opt.selected = true;
      select.appendChild(opt);
    });
    el.innerHTML = '';
    el.appendChild(select);
    select.focus();
    select.onchange = () => { mat.category = select.value; saveData(); rerenderPage(); };
    select.onblur = () => rerenderPage();
    return;
  }

  // For unit, use dropdown
  if (field === 'unit') {
    const units = ['طن', 'كجم', 'لتر'];
    const select = document.createElement('select');
    select.className = 'input';
    select.style.width = '80px';
    select.style.padding = '4px';
    units.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u;
      opt.textContent = u;
      if (u === oldValue) opt.selected = true;
      select.appendChild(opt);
    });
    el.innerHTML = '';
    el.appendChild(select);
    select.focus();
    select.onchange = () => { mat.unit = select.value; saveData(); rerenderPage(); };
    select.onblur = () => rerenderPage();
    return;
  }

  // Text/Number input
  const input = document.createElement('input');
  input.type = isNumber ? 'number' : 'text';
  input.className = 'input';
  input.value = oldValue;
  input.style.width = isNumber ? '90px' : '160px';
  input.style.padding = '4px 8px';
  input.style.fontSize = '13px';
  if (isNumber) input.step = field === 'tonPrice' ? '50' : '0.1';

  el.innerHTML = '';
  el.appendChild(input);
  input.focus();
  input.select();

  const commit = () => {
    let newVal = input.value;
    if (isNumber) newVal = parseFloat(newVal) || 0;
    if (newVal === oldValue) { rerenderPage(); return; }
    mat[field] = newVal;
    saveData();
    rerenderPage();
  };

  input.onblur = commit;
  input.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    else if (e.key === 'Escape') { rerenderPage(); }
  };
}

function deleteMaterial(materialId) {
  const mat = state.materials.find(m => m.id === materialId);
  if (!mat) return;
  if (!confirm(`هل أنت متأكد من حذف "${mat.name}"؟\n\nتنبيه: قد تكون هذه المادة مستخدمة في وصفات.`)) return;
  state.materials = state.materials.filter(m => m.id !== materialId);
  saveData();
  render();
}

function openMovementModal(materialId, type) {
  const mat = state.materials.find(m => m.id === materialId);
  if (!mat) return;
  modal = { type: 'movement', materialId, movType: type, qty: '', notes: '' };
  render();
}

function openEditMaterialModal(materialId) {
  const mat = state.materials.find(m => m.id === materialId);
  if (!mat) return;
  modal = { type: 'editMaterial', materialId, data: { ...mat } };
  render();
}

function executeEditMaterial() {
  const mat = state.materials.find(m => m.id === modal.materialId);
  if (!mat) return;
  const d = modal.data;
  if (!d.name || !d.code) { alert('الاسم والكود مطلوبان'); return; }
  Object.assign(mat, {
    name: d.name, nameEn: d.nameEn, code: d.code, category: d.category,
    unit: d.unit, supplier: d.supplier,
    tonPrice: +d.tonPrice || 0, currentStock: +d.currentStock || 0,
    minStock: +d.minStock || 0, protein: +d.protein || 0, energy: +d.energy || 0,
  });
  saveData();
  modal = null;
  render();
}

function openAddMaterialModal() {
  modal = { type: 'addMaterial', data: { name: '', nameEn: '', code: '', category: 'حبوب', unit: 'طن', supplier: '', tonPrice: '', currentStock: '', minStock: '', protein: 0, energy: 0 } };
  render();
}

function executeMovement() {
  const mat = state.materials.find(m => m.id === modal.materialId);
  const qty = parseFloat(modal.qty);
  if (!qty || qty <= 0) { alert('يرجى إدخال كمية صحيحة'); return; }
  if (modal.movType === 'وارد') mat.currentStock += qty;
  else mat.currentStock = Math.max(0, mat.currentStock - qty);
  state.movements.push({
    id: Date.now(), materialId: mat.id, type: modal.movType,
    qty, date: todayStr(), ref: 'MAN-' + Date.now().toString().slice(-6), notes: modal.notes,
  });
  saveData();
  modal = null;
  render();
}

function executeAddMaterial() {
  const d = modal.data;
  if (!d.name || !d.code) { alert('الاسم والكود مطلوبان'); return; }
  state.materials.push({
    ...d, id: Date.now(),
    tonPrice: +d.tonPrice || 0, currentStock: +d.currentStock || 0,
    minStock: +d.minStock || 0, protein: +d.protein || 0, energy: +d.energy || 0,
    lastPurchase: todayStr(),
  });
  saveData();
  modal = null;

// ============================================================
// PRODUCTION ACTIONS: Cancel, Edit, Delete
// ============================================================
function cancelProduction(orderId) {
  const order = state.production.find(p => p.id === orderId);
  if (!order) return;
  if (order.status === 'ملغي') { alert('هذا الأمر ملغي بالفعل'); return; }

  const wasCompleted = order.status === 'مكتمل';
  const msg = wasCompleted
    ? `هل تريد إلغاء أمر الإنتاج "${order.batchNo}"؟\n\n✅ ستتم إعادة المواد التالية للمخزون:\n${getProductionMaterialList(order)}`
    : `هل تريد إلغاء أمر الإنتاج "${order.batchNo}"؟`;

  if (!confirm(msg)) return;

  // If completed, restore materials to inventory
  if (wasCompleted) {
    const formula = state.formulas.find(f => f.id === order.formulaId);
    if (formula) {
      formula.ingredients.forEach(ing => {
        const mat = state.materials.find(m => m.id === ing.materialId);
        if (mat) {
          const restoreQty = (ing.percentage / 100) * order.quantity;
          mat.currentStock += restoreQty;
          state.movements.push({
            id: Date.now() + ing.materialId, materialId: mat.id, type: 'مرتجع',
            qty: restoreQty, date: todayStr(),
            ref: order.batchNo + '-إلغاء', notes: 'استرجاع من إلغاء أمر إنتاج',
          });
        }
      });
    }
  }

  order.status = 'ملغي';
  saveData();
  render();
  alert(wasCompleted ? '✅ تم إلغاء الأمر وإعادة المواد للمخزون' : '✅ تم إلغاء الأمر');
}

function getProductionMaterialList(order) {
  const formula = state.formulas.find(f => f.id === order.formulaId);
  if (!formula) return '';
  return formula.ingredients.map(ing => {
    const mat = state.materials.find(m => m.id === ing.materialId);
    const qty = (ing.percentage / 100) * order.quantity;
    return `• ${mat ? mat.name : '?'}: ${fmt(qty, 2)} ${mat ? mat.unit : ''}`;
  }).join('\n');
}

function deleteProduction(orderId) {
  const order = state.production.find(p => p.id === orderId);
  if (!order) return;
  const isActive = order.status !== 'ملغي';
  const msg = isActive
    ? `⚠️ تحذير: ستحذف أمر الإنتاج "${order.batchNo}" نهائياً.\n\n${order.status === 'مكتمل' ? 'هل تريد أيضاً إعادة المواد المستهلكة للمخزون؟\n(اضغط موافق = نعم، أو إلغاء)' : 'هل أنت متأكد؟'}`
    : `حذف أمر الإنتاج "${order.batchNo}" نهائياً؟`;

  if (!confirm(msg)) return;

  // For completed orders, also restore materials
  if (order.status === 'مكتمل') {
    const formula = state.formulas.find(f => f.id === order.formulaId);
    if (formula) {
      formula.ingredients.forEach(ing => {
        const mat = state.materials.find(m => m.id === ing.materialId);
        if (mat) {
          mat.currentStock += (ing.percentage / 100) * order.quantity;
        }
      });
    }
  }

  state.production = state.production.filter(p => p.id !== orderId);
  saveData();
  render();
}

function openEditProductionModal(orderId) {
  const order = state.production.find(p => p.id === orderId);
  if (!order) return;
  modal = {
    type: 'editProduction',
    orderId,
    data: {
      formulaId: order.formulaId,
      quantity: order.quantity,
      productionType: order.productionType,
      date: order.date,
      notes: order.notes || '',
      customer: order.customer || '',
      status: order.status,
    },
    originalQuantity: order.quantity,
    originalStatus: order.status,
    originalFormulaId: order.formulaId,
  };
  render();
}

function executeEditProduction() {
  const order = state.production.find(p => p.id === modal.orderId);
  if (!order) return;
  const d = modal.data;
  const newQty = parseFloat(d.quantity);
  if (!d.formulaId || !newQty || newQty <= 0) { alert('يرجى ملء الحقول المطلوبة بقيم صحيحة'); return; }

  const formula = state.formulas.find(f => f.id === +d.formulaId);
  if (!formula) return;

  // If order was completed: reverse the old material consumption, then apply new
  const wasCompleted = modal.originalStatus === 'مكتمل';
  const willBeCompleted = d.status === 'مكتمل';

  if (wasCompleted) {
    // Restore original materials
    const oldFormula = state.formulas.find(f => f.id === modal.originalFormulaId);
    if (oldFormula) {
      oldFormula.ingredients.forEach(ing => {
        const mat = state.materials.find(m => m.id === ing.materialId);
        if (mat) mat.currentStock += (ing.percentage / 100) * modal.originalQuantity;
      });
    }
  }

  if (willBeCompleted) {
    // Check stock for new quantity
    const shortages = [];
    formula.ingredients.forEach(ing => {
      const mat = state.materials.find(m => m.id === ing.materialId);
      const needed = (ing.percentage / 100) * newQty;
      if (mat && mat.currentStock < needed) {
        shortages.push(`${mat.name}: متاح ${fmt(mat.currentStock, 2)} - المطلوب ${fmt(needed, 2)}`);
      }
    });
    if (shortages.length > 0) {
      if (!confirm('⚠️ تحذير: الخامات قد لا تكون كافية:\n\n' + shortages.join('\n') + '\n\nهل تريد المتابعة؟')) {
        // Restore the restored amounts back (rollback)
        if (wasCompleted) {
          const oldFormula = state.formulas.find(f => f.id === modal.originalFormulaId);
          if (oldFormula) {
            oldFormula.ingredients.forEach(ing => {
              const mat = state.materials.find(m => m.id === ing.materialId);
              if (mat) mat.currentStock -= (ing.percentage / 100) * modal.originalQuantity;
            });
          }
        }
        return;
      }
    }
    // Deduct new materials
    formula.ingredients.forEach(ing => {
      const mat = state.materials.find(m => m.id === ing.materialId);
      if (mat) {
        const consume = (ing.percentage / 100) * newQty;
        mat.currentStock = Math.max(0, mat.currentStock - consume);
      }
    });
    order.cost = calcFormulaCost(formula) * newQty;
  } else {
    order.cost = 0;
  }

  // Update order
  order.formulaId = +d.formulaId;
  order.formulaName = formula.name;
  order.quantity = newQty;
  order.productionType = d.productionType;
  order.date = d.date;
  order.notes = d.notes;
  order.customer = d.customer || '';
  order.status = d.status;

  saveData();
  modal = null;
  render();
  alert('✅ تم تحديث أمر الإنتاج بنجاح');
}

function openProductionModal() {
  modal = { type: 'production', formulaId: '', quantity: '', productionType: 'دريس', date: todayStr(), notes: '', customer: '' };
  render();
}

function executeProduction() {
  if (!modal.formulaId || !modal.quantity) { alert('يرجى ملء الحقول المطلوبة'); return; }
  const formula = state.formulas.find(f => f.id === +modal.formulaId);
  if (!formula) return;
  const qty = parseFloat(modal.quantity);

  // Check stock sufficiency
  const shortages = [];
  formula.ingredients.forEach(ing => {
    const mat = state.materials.find(m => m.id === ing.materialId);
    const needed = (ing.percentage / 100) * qty;
    if (mat && mat.currentStock < needed) {
      shortages.push(`${mat.name}: متاح ${fmt(mat.currentStock, 2)} - المطلوب ${fmt(needed, 2)}`);
    }
  });
  if (shortages.length > 0) {
    if (!confirm('⚠️ تحذير: الخامات قد لا تكون كافية:\n\n' + shortages.join('\n') + '\n\nهل تريد المتابعة؟')) return;
  }

  const cost = calcFormulaCost(formula) * qty;
  const batchNo = `B-${modal.date.replace(/-/g, '').slice(0, 8)}-${String(state.production.length + 1).padStart(3, '0')}`;

  // Deduct materials
  formula.ingredients.forEach(ing => {
    const mat = state.materials.find(m => m.id === ing.materialId);
    if (mat) {
      const consume = (ing.percentage / 100) * qty;
      mat.currentStock = Math.max(0, mat.currentStock - consume);
      state.movements.push({
        id: Date.now() + ing.materialId, materialId: mat.id, type: 'صادر',
        qty: consume, date: modal.date, ref: batchNo, notes: 'إنتاج',
      });
    }
  });

  state.production.push({
    id: Date.now(), batchNo, formulaId: formula.id, formulaName: formula.name,
    quantity: qty, productionType: modal.productionType, date: modal.date,
    status: 'مكتمل', cost, customer: modal.customer || '', notes: modal.notes,
  });
  saveData();
  modal = null;
  render();
}

let salesFilter = { search: '', period: 'all', customer: 'الكل', product: 'الكل', payStatus: 'الكل' };

function renderSales() {
  // Get unique customers and products from sales
  const allCustomers = ['الكل', ...new Set((state.sales || []).map(s => s.customer).filter(Boolean))];
  const allProducts = ['الكل', ...new Set((state.sales || []).map(s => s.product).filter(Boolean))];

  // Filter sales
  const range = salesFilter.period !== 'all' ? getDateRange(salesFilter.period) : null;
  const filtered = (state.sales || []).filter(s => {
    // Date filter
    if (range) {
      const d = new Date(s.date);
      if (d < range.start || d > range.end) return false;
    }
    // Customer filter
    if (salesFilter.customer !== 'الكل' && s.customer !== salesFilter.customer) return false;
    // Product filter
    if (salesFilter.product !== 'الكل' && s.product !== salesFilter.product) return false;
    // Payment status filter
    const remaining = (s.total || 0) - (s.paid || 0);
    if (salesFilter.payStatus === 'مدفوع' && remaining > 0) return false;
    if (salesFilter.payStatus === 'جزئي' && (remaining <= 0 || (s.paid || 0) === 0)) return false;
    if (salesFilter.payStatus === 'غير مدفوع' && (s.paid || 0) > 0) return false;
    // Search
    if (salesFilter.search) {
      const q = salesFilter.search.toLowerCase();
      const txt = `${s.customer} ${s.product} ${s.notes || ''} ${s.batchNo || ''}`.toLowerCase();
      if (!txt.includes(q)) return false;
    }
    return true;
  });

  // Stats from filtered
  const totalSales = filtered.reduce((s, sale) => s + (sale.total || 0), 0);
  const totalPaid = filtered.reduce((s, sale) => s + (sale.paid || 0), 0);
  const totalDebt = totalSales - totalPaid;
  const totalQty = filtered.reduce((s, sale) => s + (sale.quantity || 0), 0);

  return `
    <div class="page-header">
      <div>
        <div class="page-title">💰 إدارة المبيعات</div>

        <div class="stat-sub">${filtered.length} فاتورة</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📦</div>
        <div class="stat-label">إجمالي الكميات</div>
        <div class="stat-value">${fmt(totalQty, 1)} طن</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-icon">✅</div>
        <div class="stat-label">المدفوع</div>
        <div class="stat-value">${money(totalPaid)}</div>
      </div>
      <div class="stat-card ${totalDebt > 0 ? 'red' : 'green'}">
        <div class="stat-icon">⏳</div>
        <div class="stat-label">المتبقي (مديونيات)</div>
        <div class="stat-value">${money(totalDebt)}</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="panel" style="padding:14px;">
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:10px;">🔍 الفلاتر:</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;">
        <input class="input" style="flex:1;min-width:180px;" placeholder="بحث..."
          value="${esc(salesFilter.search)}"
          oninput="salesFilter.search = this.value; rerenderPage();" />
        <select class="input" style="width:auto;min-width:140px;" onchange="salesFilter.period=this.value; rerenderPage();">

          <option value="monthly" ${salesFilter.period==='monthly'?'selected':''}>آخر شهر</option>

          <option value="halfyear" ${salesFilter.period==='halfyear'?'selected':''}>6 شهور</option>

function openSalesModal() {
  // Auto-suggest completed production batches not yet sold
  modal = {
    type: 'sales',
    data: {
      date: todayStr(),
      customer: '',
      product: '',
      quantity: '',
      unitPrice: '',
      total: 0,
      paid: '',
      batchNo: '',
      notes: '',
    }
  };
  render();
}

function openEditSalesModal(saleId) {
  const sale = (state.sales || []).find(s => s.id === saleId);
  if (!sale) return;
  modal = {
    type: 'editSales',
    saleId,
    data: { ...sale, paid: sale.paid || 0 }
  };
  render();
}

function executeSale() {
  const d = modal.data;
  if (!d.customer || !d.product || !d.quantity || !d.unitPrice) {
    alert('يرجى ملء: العميل + المنتج + الكمية + السعر');
    return;
  }
  const qty = parseFloat(d.quantity);
  const price = parseFloat(d.unitPrice);
  const total = qty * price;
  const paid = parseFloat(d.paid) || 0;

  const isEdit = modal.type === 'editSales';
  if (isEdit) {
    const sale = state.sales.find(s => s.id === modal.saleId);
    if (sale) {
      Object.assign(sale, {
        date: d.date, customer: d.customer, product: d.product,
        quantity: qty, unitPrice: price, total, paid,
        batchNo: d.batchNo, notes: d.notes,
      });
    }
  } else {
    if (!state.sales) state.sales = [];
    state.sales.push({
      id: Date.now(),
      date: d.date, customer: d.customer, product: d.product,
      quantity: qty, unitPrice: price, total, paid,
      batchNo: d.batchNo, notes: d.notes,
    });
  }
  saveData();
  modal = null;
  render();
}

function deleteSale(saleId) {
  const sale = state.sales.find(s => s.id === saleId);
  if (!sale) return;
  if (!confirm(`حذف فاتورة "${sale.customer}" بقيمة ${money(sale.total)}؟`)) return;
  state.sales = state.sales.filter(s => s.id !== saleId);
  saveData();
  render();
}

function openPaymentModal(saleId) {
  const sale = state.sales.find(s => s.id === saleId);
  if (!sale) return;
  const remaining = (sale.total || 0) - (sale.paid || 0);
  modal = { type: 'payment', saleId, amount: remaining > 0 ? remaining : '' };
  render();
}

function recordPayment() {
  const sale = state.sales.find(s => s.id === modal.saleId);
  if (!sale) return;
  const amount = parseFloat(modal.amount);
  if (!amount || amount <= 0) { alert('أدخل مبلغ صحيح'); return; }
  sale.paid = (sale.paid || 0) + amount;
  saveData();
  modal = null;
  render();
}

// REPORTS - Comprehensive time-period reports
// ============================================================
let reportsPeriod = 'daily';
let reportsFilters = {
  customer: 'الكل',
  formula: 'الكل',
  productionType: 'الكل',
  status: 'الكل',
  product: 'الكل',
  payStatus: 'الكل',
  customRange: { from: '', to: '' },
};

function getDateRange(period) {
  const today = new Date();
  today.setHours(23, 59, 59, 999);
  let start;
  let label;

  // Custom range
  if (period === 'custom' && reportsFilters.customRange.from && reportsFilters.customRange.to) {
    start = new Date(reportsFilters.customRange.from);
    start.setHours(0, 0, 0, 0);
    const end = new Date(reportsFilters.customRange.to);
    end.setHours(23, 59, 59, 999);
    return { start, end, label: `من ${reportsFilters.customRange.from} إلى ${reportsFilters.customRange.to}` };
  }

  switch (period) {
    case 'daily':
      start = new Date(today);
      start.setHours(0, 0, 0, 0);
      label = 'اليوم';
      break;
    case 'yesterday':
      start = new Date(today);
      start.setDate(start.getDate() - 1);
      start.setHours(0, 0, 0, 0);
      const endY = new Date(start);
      endY.setHours(23, 59, 59, 999);
      label = 'أمس';
      return { start, end: endY, label };
    case 'weekly':
      start = new Date(today);
      start.setDate(start.getDate() - 7);
      label = 'آخر 7 أيام';
      break;
    case 'monthly':
      start = new Date(today);
      start.setDate(start.getDate() - 30);
      label = 'آخر 30 يوم';
      break;
    case 'quarterly':
      start = new Date(today);
      start.setMonth(start.getMonth() - 3);
      label = 'آخر 3 شهور (ربع سنوي)';
      break;
    case 'halfyear':
      start = new Date(today);
      start.setMonth(start.getMonth() - 6);
      label = 'آخر 6 شهور';
      break;
    case 'yearly':
      start = new Date(today);
      start.setFullYear(start.getFullYear() - 1);
      label = 'آخر سنة';
      break;
    case 'all':
    default:
      start = new Date(0);
      label = 'كل الفترات';
  }
  return { start, end: today, label };
}

function filterByDate(items, dateField, range) {
  return items.filter(item => {
    const d = new Date(item[dateField]);
    return d >= range.start && d <= range.end;
  });
}

function renderReports() {
  const range = getDateRange(reportsPeriod);

  // Filter data by date range
  let productionInRange = filterByDate(state.production, 'date', range);
  let salesInRange = filterByDate(state.sales || [], 'date', range);
  let movementsInRange = filterByDate(state.movements, 'date', range);

  // Apply additional filters
  if (reportsFilters.customer !== 'الكل') {
    productionInRange = productionInRange.filter(p => p.customer === reportsFilters.customer);
    salesInRange = salesInRange.filter(s => s.customer === reportsFilters.customer);
  }
  if (reportsFilters.formula !== 'الكل') {
    productionInRange = productionInRange.filter(p => p.formulaName === reportsFilters.formula);
  }
  if (reportsFilters.productionType !== 'الكل') {
    productionInRange = productionInRange.filter(p => p.productionType === reportsFilters.productionType);
  }
  if (reportsFilters.status !== 'الكل') {
    productionInRange = productionInRange.filter(p => p.status === reportsFilters.status);
  }
  if (reportsFilters.product !== 'الكل') {
    salesInRange = salesInRange.filter(s => s.product === reportsFilters.product);
  }
  if (reportsFilters.payStatus !== 'الكل') {
    salesInRange = salesInRange.filter(s => {
      const rem = (s.total || 0) - (s.paid || 0);
      if (reportsFilters.payStatus === 'مدفوع') return rem <= 0;
      if (reportsFilters.payStatus === 'جزئي') return rem > 0 && (s.paid || 0) > 0;
      if (reportsFilters.payStatus === 'غير مدفوع') return (s.paid || 0) === 0;
      return true;
    });
  }

  // Collect unique values for dropdowns
  const allCustomers = ['الكل', ...new Set([
    ...state.production.map(p => p.customer).filter(Boolean),
    ...(state.sales || []).map(s => s.customer).filter(Boolean),
  ])];
  const allFormulas = ['الكل', ...state.formulas.map(f => f.name)];
  const allProducts = ['الكل', ...new Set((state.sales || []).map(s => s.product).filter(Boolean))];

  // Production stats
  const completedProd = productionInRange.filter(p => p.status === 'مكتمل');
  const totalProd = completedProd.reduce((s, p) => s + p.quantity, 0);
  const totalCost = completedProd.reduce((s, p) => s + (p.cost || 0), 0);
  const avgCostPerTon = totalProd > 0 ? totalCost / totalProd : 0;

  // Sales stats
  const totalSales = salesInRange.reduce((s, sale) => s + (sale.total || 0), 0);
  const totalPaid = salesInRange.reduce((s, sale) => s + (sale.paid || 0), 0);
  const totalDebt = totalSales - totalPaid;
  const totalSold = salesInRange.reduce((s, sale) => s + (sale.quantity || 0), 0);

    customerMap[p.customer].cost += (p.cost || 0);

    matConsumption[m.materialId] += m.qty;

    })

      </div>
      <button class="btn gray" onclick="window.print()">🖨️ طباعة / حفظ PDF</button>
    </div>

    <!-- Period Selector -->
    <div class="panel" style="padding: 10px;">

    <div class="grid-2">
      <!-- Top Materials Consumed -->
      <div class="panel">
        <div class="panel-header"><div class="panel-title">📉 استهلاك المواد الخام</div></div>
        ${topMaterials.length === 0 ? '<div class="empty-state"><div class="empty-state-icon">📦</div>لا توجد حركات في هذه الفترة</div>' : `
        <div class="table-wrap">
          <table>
            <thead><tr><th>المادة</th><th>الكمية</th><th>القيمة</th></tr></thead>
            <tbody>
              ${topMaterials.slice(0, 10).map(m => `
                <tr>
                  <td>${esc(m.name)}</td>
                  <td class="mono" style="color:#fbbf24;font-weight:bold;">${fmt(m.qty, 1)} ${esc(m.unit)}</td>
                  <td class="mono" style="color:var(--text-dim);">${money(m.value)}</td>

              `).join('')}
            </tbody>
          </table>
        </div>
        `}
      </div>

      <!-- Type Distribution -->
      <div>
        <div class="panel">
          <div class="panel-header"><div class="panel-title">🔧 توزيع نوع الإنتاج</div></div>
          ${totalProd === 0 ? '<div class="empty-state"><div class="empty-state-icon">🏭</div>لا يوجد إنتاج</div>' : byType.map(t => `
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
              <span style="width:50px;font-size:13px;">${esc(t.name)}</span>
              <div class="bar" style="flex:1;height:14px;">
                <div class="bar-fill" style="width: ${(t.qty / totalProd) * 100}%; background: linear-gradient(to left, #8b5cf6, #ec4899);"></div>
              </div>
              <span class="mono" style="color:#60a5fa;font-weight:bold;width:80px;text-align:left;font-size:13px;">${fmt(t.qty, 1)} طن</span>
            </div>
          `).join('')}
        </div>

        <div class="panel">
          <div class="panel-header"><div class="panel-title">📦 قيمة المخزون الحالي</div></div>
          ${state.materials.slice(0, 6).map(m => `
            <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(55,65,81,0.5);font-size:13px;">
              <span style="color:var(--text-dim);">${esc(m.name)}</span>
              <span class="mono" style="color:#6ee7b7;">${money(m.currentStock * m.tonPrice)}</span>
            </div>
          `).join('')}
          <div style="display:flex;justify-content:space-between;padding-top:8px;margin-top:4px;font-weight:bold;">
            <span>الإجمالي</span>
            <span class="mono" style="color:#fbbf24;">${money(state.materials.reduce((s, m) => s + m.currentStock * m.tonPrice, 0))}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Summary Footer -->
    <div class="panel" style="background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(139,92,246,0.05)); border-color: rgba(59,130,246,0.3);">
      <div class="panel-header"><div class="panel-title">📋 ملخص الفترة: ${range.label}</div></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));gap:12px;font-size:13px;">
        <div style="background:rgba(17,24,39,0.6);padding:12px;border-radius:8px;">
          <div style="color:var(--text-dim);margin-bottom:6px;">📅 من تاريخ</div>
          <div style="font-weight:bold;color:#60a5fa;">${range.start.toLocaleDateString('ar-EG')}</div>
        </div>
        <div style="background:rgba(17,24,39,0.6);padding:12px;border-radius:8px;">
          <div style="color:var(--text-dim);margin-bottom:6px;">📅 إلى تاريخ</div>
          <div style="font-weight:bold;color:#60a5fa;">${range.end.toLocaleDateString('ar-EG')}</div>
        </div>
        <div style="background:rgba(17,24,39,0.6);padding:12px;border-radius:8px;">
          <div style="color:var(--text-dim);margin-bottom:6px;">🏭 إنتاجية متوسطة</div>
          <div style="font-weight:bold;color:#fbbf24;">${completedProd.length > 0 ? fmt(totalProd / completedProd.length, 1) : 0} طن/دفعة</div>
        </div>
        <div style="background:rgba(17,24,39,0.6);padding:12px;border-radius:8px;">
          <div style="color:var(--text-dim);margin-bottom:6px;">💰 ربح/طن</div>
          <div style="font-weight:bold;color:${profit >= 0 ? '#6ee7b7' : '#fca5a5'};">${money(totalProd > 0 ? profit / totalProd : 0)}</div>
        </div>
      </div>
    </div>
  `;
}

function renderModal() {
  if (!modal) return '';
  if (modal.type === 'movement') {
    const mat = state.materials.find(m => m.id === modal.materialId);
    const previewStock = modal.movType === 'وارد'
      ? mat.currentStock + (parseFloat(modal.qty) || 0)
      : Math.max(0, mat.currentStock - (parseFloat(modal.qty) || 0));
    return `
      <div class="modal-overlay" onclick="if(event.target===this){modal=null;render();}">
        <div class="modal">
          <div class="modal-title">حركة مخزون — ${esc(mat.name)}</div>
          <div class="chips">
            ${['وارد', 'صادر', 'مرتجع'].map(t => `
              <button class="chip ${modal.movType === t ? 'active' : ''}" style="flex:1;" onclick="modal.movType='${t}'; render();">${t}</button>
            `).join('')}
          </div>
          <div class="form-field">
            <label class="label">الكمية (${esc(mat.unit)})</label>
            <input type="number" class="input" value="${modal.qty}" oninput="modal.qty=this.value; render();" />
          </div>
          <div class="form-field">
            <label class="label">ملاحظات</label>
            <input class="input" value="${esc(modal.notes)}" oninput="modal.notes=this.value;" />
          </div>
          <div style="background:var(--bg-2);border-radius:8px;padding:12px;font-size:13px;">
            <div style="display:flex;justify-content:space-between;color:var(--text-dim);">
              <span>المخزون الحالي:</span><b class="mono">${fmt(mat.currentStock, 1)} ${mat.unit}</b>
            </div>
            ${modal.qty ? `
              <div style="display:flex;justify-content:space-between;margin-top:4px;color:var(--text-dim);">
                <span>بعد الحركة:</span>
                <b class="mono" style="color: ${modal.movType === 'وارد' ? '#6ee7b7' : '#fca5a5'};">${fmt(previewStock, 1)} ${mat.unit}</b>
              </div>
            ` : ''}
          </div>
          <div class="modal-row">
            <button class="btn" onclick="executeMovement()">تأكيد الحركة</button>
            <button class="btn gray" onclick="modal=null; render();">إلغاء</button>
          </div>
        </div>
      </div>
    `;
  }
  if (modal.type === 'production' || modal.type === 'editProduction') {
    const isEdit = modal.type === 'editProduction';
    const data = isEdit ? modal.data : modal;
    const previewCost = data.formulaId && data.quantity
      ? calcFormulaCost(state.formulas.find(f => f.id === +data.formulaId) || { ingredients: [] }) * parseFloat(data.quantity)
      : 0;
    return `
      <div class="modal-overlay" onclick="if(event.target===this){modal=null;render();}">
        <div class="modal">
          <div class="modal-title">${isEdit ? '✏️ تعديل أمر الإنتاج' : 'أمر إنتاج جديد'}</div>
          <div class="form-field">
            <label class="label">الوصفة</label>
            <select class="input" onchange="${isEdit ? 'modal.data.formulaId' : 'modal.formulaId'}=this.value; updateProductionPreview();">
              <option value="">-- اختر الوصفة --</option>
              ${state.formulas.map(f => `<option value="${f.id}" ${data.formulaId == f.id ? 'selected' : ''}>${esc(f.name)}</option>`).join('')}
            </select>
          </div>
          <div class="form-field">
            <label class="label">الكمية بالطن</label>
            <input id="productionQtyInput" type="text" inputmode="decimal" class="input"
              placeholder="مثال: 20 أو 15.5"
              value="${data.quantity}"
              oninput="${isEdit ? 'modal.data.quantity' : 'modal.quantity'}=this.value.replace(/[^0-9.]/g,''); this.value=this.value.replace(/[^0-9.]/g,''); updateProductionPreview();" />
            <small style="color:var(--text-dimmer); font-size:11px; margin-top:4px; display:block;">اكتب الرقم مباشرة. للكسور استخدم النقطة (مثال: 15.5)</small>
          </div>
          <div class="form-field">
            <label class="label">نوع الإنتاج</label>
            <div class="chips">
              ${['دريس', 'بيليت'].map(t => `<button class="chip ${data.productionType === t ? 'active' : ''}" style="flex:1;" onclick="${isEdit ? 'modal.data.productionType' : 'modal.productionType'}='${t}'; render();">${t}</button>`).join('')}
            </div>
          </div>
          <div class="form-field">
            <label class="label">التاريخ</label>
            <input type="date" class="input" value="${data.date}" onchange="${isEdit ? 'modal.data.date' : 'modal.date'}=this.value;" />
          </div>
          ${isEdit ? `
            <div class="form-field">
              <label class="label">الحالة</label>
              <div class="chips">
                ${['مكتمل', 'قيد التنفيذ', 'ملغي'].map(s => `
                  <button class="chip ${data.status === s ? 'active' : ''}" style="flex:1;" onclick="modal.data.status='${s}'; render();">${s}</button>
                `).join('')}
              </div>
            </div>
          ` : ''}
          <div class="form-field">
            <label class="label">👤 العميل (لمن تم تصنيع هذه الدفعة)</label>
            <input class="input" placeholder="اسم العميل / المزرعة (اختياري)"
              value="${esc(data.customer || '')}"
              oninput="${isEdit ? 'modal.data.customer' : 'modal.customer'}=this.value;" />
          </div>
          <div class="form-field">
            <label class="label">📝 ملاحظات</label>
            <textarea class="input" rows="3" placeholder="أي ملاحظات إضافية..." style="resize:vertical;min-height:60px;font-family:inherit;"
              oninput="${isEdit ? 'modal.data.notes' : 'modal.notes'}=this.value;">${esc(data.notes)}</textarea>
          </div>
          <div id="productionPreview">
            ${previewCost > 0 ? `
              <div style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);padding:10px;border-radius:8px;">
                <div style="color:#93c5fd;font-size:13px;">التكلفة المتوقعة: <b class="mono">${money(previewCost)}</b></div>
                <small style="color:#93c5fd;">${isEdit ? 'سيتم تعديل المخزون حسب التغييرات' : 'سيتم خصم الخامات من المخزون تلقائياً'}</small>
              </div>
            ` : ''}
          </div>
          <div class="modal-row">
            <button class="btn green" onclick="${isEdit ? 'executeEditProduction()' : 'executeProduction()'}">${isEdit ? '💾 حفظ التعديلات' : '⚙️ تنفيذ الإنتاج'}</button>
            <button class="btn gray" onclick="modal=null; render();">إلغاء</button>
          </div>
        </div>
      </div>
    `;
  }
  if (modal.type === 'addMaterial' || modal.type === 'editMaterial') {
    const isEdit = modal.type === 'editMaterial';
    const fields = [
      { label: 'اسم المادة عربي', key: 'name' },
      { label: 'اسم المادة إنجليزي', key: 'nameEn' },
      { label: 'الكود', key: 'code' },
      { label: 'المورد', key: 'supplier' },
      { label: 'سعر الطن (ج.م)', key: 'tonPrice', type: 'number' },
      { label: 'المخزون الحالي', key: 'currentStock', type: 'number' },
      { label: 'الحد الأدنى', key: 'minStock', type: 'number' },
      { label: 'البروتين %', key: 'protein', type: 'number' },
      { label: 'الطاقة kcal/kg', key: 'energy', type: 'number' },
    ];
    return `
      <div class="modal-overlay" onclick="if(event.target===this){modal=null;render();}">
        <div class="modal">
          <div class="modal-title">${isEdit ? '✏️ تعديل بيانات المادة' : 'إضافة مادة خام جديدة'}</div>
          <div class="form-grid">
            ${fields.map(f => `
              <div class="form-field">
                <label class="label">${f.label}</label>
                <input type="${f.type || 'text'}" class="input" value="${esc(modal.data[f.key])}" oninput="modal.data['${f.key}']=this.value;" ${f.type === 'number' ? 'step="0.1"' : ''} />
              </div>
            `).join('')}
            <div class="form-field">
              <label class="label">الفئة</label>
              <select class="input" onchange="modal.data.category=this.value;">
                ${['حبوب', 'بروتين', 'معادن', 'دهون', 'مركزات', 'إضافات', 'أحماض أمينية'].map(c => `<option ${modal.data.category === c ? 'selected' : ''}>${c}</option>`).join('')}
              </select>
            </div>
            <div class="form-field">
              <label class="label">الوحدة</label>
              <select class="input" onchange="modal.data.unit=this.value;">
                ${['طن', 'كجم', 'لتر'].map(u => `<option ${modal.data.unit === u ? 'selected' : ''}>${u}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="modal-row">
            <button class="btn" onclick="${isEdit ? 'executeEditMaterial()' : 'executeAddMaterial()'}">${isEdit ? '💾 حفظ التعديلات' : 'حفظ'}</button>
            <button class="btn gray" onclick="modal=null; render();">إلغاء</button>
          </div>
        </div>
      </div>
    `;
  }

  // Sales Modal (new + edit)
  if (modal.type === 'sales' || modal.type === 'editSales') {
    const d = modal.data;
    const isEdit = modal.type === 'editSales';
    const qty = parseFloat(d.quantity) || 0;
    const price = parseFloat(d.unitPrice) || 0;
    const computedTotal = qty * price;
    const paid = parseFloat(d.paid) || 0;
    const remaining = computedTotal - paid;

    // Suggest from production batches
    const productOptions = [...new Set(state.formulas.map(f => f.name))];
    // Get completed batches not used yet (or all completed)
    const availableBatches = state.production.filter(p => p.status === 'مكتمل');

    return `
      <div class="modal-overlay" onclick="if(event.target===this){modal=null;render();}">
        <div class="modal" style="max-width:600px;">
          <div class="modal-title">${isEdit ? '✏️ تعديل فاتورة بيع' : '💰 فاتورة بيع جديدة'}</div>

          <div class="form-grid">
            <div class="form-field">
              <label class="label">📅 التاريخ</label>
              <input type="date" class="input" value="${d.date}" onchange="modal.data.date=this.value;" />
            </div>
            <div class="form-field">
              <label class="label">👤 العميل *</label>
              <input class="input" placeholder="اسم العميل / المزرعة" list="customers-list"
                value="${esc(d.customer)}" oninput="modal.data.customer=this.value;" />
              <datalist id="customers-list">
                ${[...new Set([...(state.sales || []).map(s => s.customer), ...state.production.map(p => p.customer).filter(Boolean)])].map(c => `<option value="${esc(c)}"></option>`).join('')}
              </datalist>
            </div>
          </div>

          <div class="form-field">
            <label class="label">📦 المنتج *</label>
            <select class="input" onchange="modal.data.product=this.value; render();">
              <option value="">-- اختر المنتج --</option>
              ${productOptions.map(p => `<option ${d.product === p ? 'selected' : ''}>${esc(p)}</option>`).join('')}
            </select>
          </div>

          ${!isEdit && availableBatches.length > 0 ? `
            <div class="form-field">
              <label class="label">🔗 ربط بدفعة إنتاج (اختياري)</label>
              <select class="input" onchange="if(this.value){const b=state.production.find(p=>p.id==this.value); modal.data.batchNo=b.batchNo; modal.data.product=b.formulaName; modal.data.quantity=b.quantity; if(!modal.data.customer)modal.data.customer=b.customer||''; render();}">
                <option value="">-- بدون ربط --</option>

function navigate(p) {

  render();
  window.scrollTo(0, 0);
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  render();
}

function rerenderPage() {
  // Save scroll, save focused input state
  const root = document.getElementById('root');
  const activeId = document.activeElement?.id;
  const scrollY = window.scrollY;
  const selectionStart = document.activeElement?.selectionStart;
  const selectionEnd = document.activeElement?.selectionEnd;
  render();
  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) {
      el.focus();
      if (selectionStart != null) try { el.setSelectionRange(selectionStart, selectionEnd); } catch(e){}
    }
  }
  window.scrollTo(0, scrollY);
}

// Updates only the cost preview block inside production modal — keeps the input focused
function updateProductionPreview() {
  if (!modal) return;
  const isEdit = modal.type === 'editProduction';
  const data = isEdit ? modal.data : modal;
  const previewEl = document.getElementById('productionPreview');
  if (!previewEl) return;

  if (data.formulaId && data.quantity) {
    const formula = state.formulas.find(f => f.id === +data.formulaId);
    if (formula) {
      const cost = calcFormulaCost(formula) * parseFloat(data.quantity);
      previewEl.innerHTML = `
        <div style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);padding:10px;border-radius:8px;">
          <div style="color:#93c5fd;font-size:13px;">التكلفة المتوقعة: <b class="mono">${money(cost)}</b></div>
          <small style="color:#93c5fd;">${isEdit ? 'سيتم تعديل المخزون حسب التغييرات' : 'سيتم خصم الخامات من المخزون تلقائياً'}</small>
        </div>
      `;
      return;
    }
  }
  previewEl.innerHTML = '';
}

function openAddUserModal() {
  modal = { type: 'addUser', email: '', name: '', role: 'viewer' };
  render();
}

function executeAddUser() {
  const email = (modal.email || '').trim().toLowerCase();
  const name = (modal.name || '').trim();
  if (!email || !email.includes('@')) { alert('يرجى إدخال بريد إلكتروني صحيح'); return; }
  if (!modal.role || !ROLES[modal.role]) { alert('يرجى اختيار دور صحيح'); return; }

  const key = emailToKey(email);
  if (allUsers[key]) {
    alert('هذا المستخدم موجود بالفعل في النظام');
    return;
  }

  db.ref(`users/${key}`).set({
    email,
    name: name || email.split('@')[0],
    role: modal.role,
    addedAt: new Date().toISOString(),
    addedBy: currentUser.email,
  }).then(() => {
    alert(`✅ تم إضافة المستخدم بنجاح\n\n⚠️ تذكير: يجب أيضاً إضافة هذا الإيميل في Firebase Console → Authentication حتى يستطيع تسجيل الدخول.`);
    modal = null;
    render();
  }).catch(err => alert('فشل: ' + err.message));
}

function openChangeRoleModal(userKey) {
  const user = allUsers[userKey];
  if (!user) return;
  modal = { type: 'changeRole', userKey, currentRole: user.role, newRole: user.role, user };
  render();
}

function executeChangeRole() {
  if (!modal.newRole || !ROLES[modal.newRole]) return;
  const userKey = modal.userKey;
  db.ref(`users/${userKey}/role`).set(modal.newRole).then(() => {
    alert(`✅ تم تغيير دور ${modal.user.email} إلى: ${ROLES[modal.newRole].label}`);
    modal = null;
    render();
  }).catch(err => alert('فشل: ' + err.message));
}

function removeUserFromSystem(userKey) {
  const user = allUsers[userKey];
  if (!user) return;
  if (!confirm(`إزالة ${user.email} من النظام؟\n\nملاحظة: هذا يزيله من قائمة الصلاحيات فقط. حسابه في Firebase Authentication يبقى. لمنعه نهائياً، احذفه من Firebase Console أيضاً.`)) return;
  db.ref(`users/${userKey}`).remove().then(() => {
    alert('✅ تم إزالة المستخدم');
    render();
  }).catch(err => alert('فشل: ' + err.message));
}

    <div class="panel" style="background:rgba(59,130,246,0.05);border-color:rgba(59,130,246,0.2);">
      <div class="panel-header"><div class="panel-title" style="color:#60a5fa;">ℹ️ كيف يعمل النظام</div></div>
      <div style="font-size:13px;color:var(--text-dim);line-height:1.8;">
        🟢 <b>نسخ يومية تلقائية:</b> يحفظ النظام نسخة كاملة من البيانات أول مرة يفتحها أي مستخدم كل يوم<br>
        🟣 <b>نسخ يدوية:</b> اضغط "نسخة احتياطية الآن" لإنشاء نسخة فورية قبل أي عملية حساسة<br>
        🔴 <b>نسخ ما قبل الاسترجاع:</b> قبل أي عملية استرجاع، يحفظ النظام البيانات الحالية تلقائياً<br>
        🗑️ <b>التنظيف التلقائي:</b> النسخ الأقدم من 30 يوم تُحذف تلقائياً<br>
        🔄 <b>الاسترجاع:</b> يمكن استرجاع أي نسخة بضغطة زر (يطلب تأكيد مرتين)
      </div>
    </div>

    <!-- Backups List -->
    <div class="panel">
      <div class="panel-header"><div class="panel-title">📚 كل النسخ الاحتياطية</div></div>

      ${backupsLoading ? '<div class="empty-state"><div class="empty-state-icon">⏳</div>جاري التحميل...</div>' : ''}

      ${!backupsLoading && backupsCache.length === 0 ? `
        <div class="empty-state">
          <div class="empty-state-icon">💾</div>
          <p>لا توجد نسخ احتياطية بعد</p>
          <button class="btn green" onclick="manualBackup()" style="margin-top:12px;">📸 إنشاء أول نسخة</button>
        </div>
      ` : ''}

      ${!backupsLoading && backupsCache.length > 0 ? `
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>التاريخ</th>
              <th>الوقت</th>
              <th>النوع</th>
              <th>أنشأها</th>
              <th>حجم البيانات</th>
              <th>الإجراءات</th>
            </tr></thead>
            <tbody>
              ${backupsCache.map(b => {
                const date = new Date(b.createdAt);
                const isManual = b.manual;
                const isPreRestore = !!b.note;
                const type = isPreRestore ? { label: '🛡️ ما قبل استرجاع', color: 'red' }
                            : isManual ? { label: '📸 يدوية', color: 'purple' }
                            : { label: '🟢 تلقائية', color: 'green' };
                const dataSize = b.data ? Object.keys(b.data).reduce((s, k) => s + (Array.isArray(b.data[k]) ? b.data[k].length : 0), 0) : 0;
                return `
                  <tr>
                    <td class="mono" style="font-size:13px;">${date.toLocaleDateString('ar-EG')}</td>
                    <td class="mono" style="font-size:12px;color:var(--text-dim);">${date.toLocaleTimeString('ar-EG')}</td>
                    <td><span class="badge ${type.color}">${type.label}</span></td>
                    <td style="font-size:12px;color:var(--text-dim);">${esc(b.createdBy || '—')}</td>
                    <td class="mono" style="font-size:12px;">${dataSize} سجل</td>
                    <td style="white-space:nowrap;">
                      <button class="btn small green" onclick="restoreBackup('${esc(b.key)}')" title="استرجاع هذه النسخة">🔄 استرجاع</button>
                      <button class="btn small" onclick="downloadBackup('${esc(b.key)}')" style="background:#6366f1;margin-right:3px;" title="تنزيل النسخة">📥</button>
                      <button class="btn small" onclick="deleteBackup('${esc(b.key)}')" style="background:#7f1d1d;margin-right:3px;" title="حذف">🗑️</button>
                    </td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      ` : ''}
    </div>
  `;
}

async function downloadBackup(backupKey) {
  try {
    const snap = await db.ref(`backups/${backupKey}`).once('value');
    const backup = snap.val();
    if (!backup) return;
    const dataStr = JSON.stringify(backup, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `backup-${backupKey}.json`;
    a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    alert('فشل التنزيل: ' + err.message);
  }
}

function renderPage() {
  switch (page) {
    case 'dashboard': return renderDashboard();
    case 'quickview': return renderQuickView();
    case 'inventory': return renderInventory();
    case 'formulas': return renderFormulas();
    case 'production': return renderProduction();
    case 'sales': return renderSales();
    case 'calculator': return renderCalculator();
    case 'reports': return renderReports();
    case 'users': return renderUsers();
    case 'backups': return renderBackups();
    case 'settings': return renderSettings();
    default: return renderDashboard();
  }
}

function render() {
  const root = document.getElementById('root');

  if (!currentUser) {
    root.innerHTML = renderLogin();
    return;
  }

  if (!dataLoaded || !rolesLoaded) {
    root.innerHTML = `
      <div class="login-screen">
        <div class="login-box" style="text-align:center;">
          <div class="login-logo">م</div>
          <div class="login-title">جاري تحميل البيانات...</div>
          <div class="login-sub">${!dataLoaded ? 'مزامنة البيانات' : ''}${!rolesLoaded ? ' • تحميل الصلاحيات' : ''}</div>
          <div style="margin-top:20px;">
            <div class="bar"><div class="bar-fill" style="width:60%;animation:pulse 1.5s infinite;"></div></div>
          </div>
        </div>
      </div>
    `;
    return;
  }

  root.innerHTML = `
    ${renderSidebar()}
    <main class="main">
      ${renderTopbar()}
      <div class="page">${renderPage()}</div>
    </main>
    ${renderModal()}
  `;
}

// Initial render
render();
</script>
</body>
</html>
